# ─────────────────────────────────────────────
# Netlify configuration for williammclarnon.com
# ─────────────────────────────────────────────

# Redirect www → non-www (or flip if preferred)
[[redirects]]
  from = "https://www.williammclarnon.com/*"
  to   = "https://williammclarnon.com/:splat"
  status = 301
  force  = true

# Security headers applied to every page
[[headers]]
  for = "/*"
  [headers.values]

    # Prevent the site being embedded in iframes on other domains (clickjacking)
    X-Frame-Options = "SAMEORIGIN"

    # Stop browsers guessing MIME types (MIME sniffing attacks)
    X-Content-Type-Options = "nosniff"

    # Only send referrer info to same origin
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable access to camera, mic, location, etc.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Force HTTPS for 1 year (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy — allows the site's known external resources
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://w.behold.so https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://media-cloud.corcoranlabs.com https://mediarouting.vestahub.com https://www.google-analytics.com;
      connect-src 'self' https://www.google-analytics.com https://analytics.google.com;
      frame-src https://w.behold.so;
    """

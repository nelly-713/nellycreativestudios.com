<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Nelly Creative Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <style>
    .success-wrap{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#fff;padding:4rem 2rem;text-align:center;
    }
    .success-inner{max-width:520px;}
    .success-icon{
      width:56px;height:56px;border-radius:50%;
      background:rgba(184,150,46,0.1);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 2rem;
    }
    .success-label{
      font-family:'Jost',sans-serif;font-size:0.65rem;
      letter-spacing:0.35em;text-transform:uppercase;
      color:#B8962E;margin-bottom:1rem;
    }
    .success-title{
      font-family:'Bodoni Moda',serif;font-style:italic;
      font-size:clamp(2rem,4vw,3rem);font-weight:400;
      color:#0A0A0A;line-height:1.1;margin-bottom:1.5rem;
    }
    .success-text{
      font-family:'Jost',sans-serif;font-size:0.95rem;
      line-height:1.9;color:#1B2A4A;margin-bottom:2.5rem;
    }
    .success-rule{
      width:40px;height:1px;background:#B8962E;
      margin:0 auto 2.5rem;
    }
  </style>
</head>
<body>
<div class="success-wrap">
  <div class="success-inner">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B8962E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-label">Order Confirmed</div>
    <h1 class="success-title">Thank you for<br>your order</h1>
    <div class="success-rule"></div>
    <p class="success-text">
      Your piece is now in Nelly's hands. Each order is handcrafted with care — please allow 2–4 weeks for creation and delivery.<br><br>
      You'll receive a confirmation email shortly. If you have any questions, write to us at <a href="mailto:nelly@jewelrybynelly.com" style="color:#B8962E;border-bottom:1px solid rgba(184,150,46,0.3)">nelly@jewelrybynelly.com</a>
    </p>
    <a href="boutique.html" class="discover">Continue Browsing</a>
  </div>
</div>
<script>
// Clear cart on successful checkout
localStorage.removeItem('ncs_cart');
</script>
</body>
</html>
